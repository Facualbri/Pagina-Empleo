server.port=8080

# ── Base de datos ────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver          # ← cambiado

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect   # ← cambiado
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# ── JWT ──────────────────────────────────────────────────────────────────────
# IMPORTANTE: definir JWT_SECRET como variable de entorno en el sistema
# Debe tener al menos 64 caracteres aleatorios
jwt.secret=${JWT_SECRET:xK9mP2vL8nQ5wR3yT7uF4zJ6aB1cD0eG4xK9mP2vL8nQ5wR3yT7uF4zJ6aB1cD0eG}
# 8 horas en milisegundos
jwt.expiration-ms=28800000

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

# ── Uploads ──────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=8MB
spring.servlet.multipart.enabled=true

# ── Recursos estaticos ───────────────────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Argentina/Buenos_Aires

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.empleosvm=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# ── Otros ────────────────────────────────────────────────────────────────────
spring.mvc.contentnegotiation.media-types.jfif=image/jpeg
spring.jpa.open-in-view=false