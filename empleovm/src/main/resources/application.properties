server.port=${PORT:8080}

# ── Base de datos ────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# ── Cloudinary ───────────────────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ── JWT ──────────────────────────────────────────────────────────────────────
# IMPORTANTE: JWT_SECRET es OBLIGATORIO como variable de entorno.
# Debe tener al menos 64 caracteres aleatorios. Sin este valor la app no arranca.
jwt.secret=${JWT_SECRET}
# 8 horas en milisegundos
jwt.expiration-ms=28800000

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

# ── Uploads ──────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=8MB
spring.servlet.multipart.enabled=true

# ── Mail (Gmail SMTP) ────────────────────────────────────────────────────────
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# URL base para links de recuperación (se reemplaza en prod)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ── Recursos estaticos ───────────────────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/,file:./
spring.mvc.static-path-pattern=/**

# ── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Argentina/Buenos_Aires

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.empleosvm=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# ── Otros ────────────────────────────────────────────────────────────────────
spring.mvc.contentnegotiation.media-types.jfif=image/jpeg
spring.mvc.contentnegotiation.media-types.svg=image/svg+xml
spring.jpa.open-in-view=false