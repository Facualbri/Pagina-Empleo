<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Villa María Empleos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --ink: #0a0a0f;
            --ink2: #1c1c2e;
            --primary: #5b5ef4;
            --pl: #ededff;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --muted: #6b7280;
            --border: #e5e7eb;
            --bg: #f7f7fb;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.12);
            --r-lg: 1rem;
            --r-xl: 1.5rem;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
        }

        /* ── Toast ── */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }

        .toast {
            background: var(--ink2);
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-lg);
            animation: slideIn .3s ease;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        .toast.info {
            border-left: 4px solid var(--primary);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }

            to {
                transform: none;
                opacity: 1;
            }
        }

        /* ── Navbar ── */
        .navbar {
            background: var(--ink2);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
        }

        .logo span {
            color: var(--primary);
        }

        .logo small {
            font-size: 0.65rem;
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            vertical-align: middle;
        }

        .btn-nav {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: .2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-nav.danger {
            border-color: rgba(239, 68, 68, .4);
            color: #fca5a5;
        }

        .btn-nav.danger:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        /* ── Page ── */
        .page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ── Stats ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .stat-card {
            background: white;
            border-radius: var(--r-xl);
            border: 1px solid var(--border);
            padding: 20px 22px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-icon.blue {
            background: var(--pl);
            color: var(--primary);
        }

        .stat-icon.green {
            background: #dcfce7;
            color: var(--success);
        }

        .stat-icon.orange {
            background: #fff7ed;
            color: var(--warning);
        }

        .stat-icon.red {
            background: #fee2e2;
            color: var(--danger);
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 4px;
            font-weight: 600;
        }

        /* ── Card ── */
        .card {
            background: white;
            border-radius: var(--r-xl);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 4px;
            padding: 16px 26px 0;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 10px 18px;
            border-radius: 8px 8px 0 0;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            border: none;
            background: transparent;
            font-family: inherit;
            color: var(--muted);
            transition: .2s;
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
            bottom: -1px;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: var(--pl);
        }

        .tab:hover:not(.active) {
            background: var(--bg);
            color: var(--ink);
        }

        .tab-badge {
            background: var(--danger);
            color: white;
            border-radius: 20px;
            padding: 1px 7px;
            font-size: 0.7rem;
        }

        /* ── Tab content ── */
        .tab-content {
            display: none;
            padding: 24px 26px;
        }

        .tab-content.active {
            display: block;
        }

        /* ── Tabla ── */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 10px 14px;
            text-align: left;
            font-size: 0.72rem;
            color: var(--muted);
            text-transform: uppercase;
            font-weight: 700;
            border-bottom: 2px solid var(--bg);
            white-space: nowrap;
        }

        tbody td {
            padding: 14px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            vertical-align: middle;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover td {
            background: #fafbff;
        }

        /* ── Badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 800;
        }

        .badge-pendiente {
            background: #fff7ed;
            color: #c2410c;
        }

        .badge-aprobado {
            background: #dcfce7;
            color: #15803d;
        }

        .badge-ninguna {
            background: var(--bg);
            color: var(--muted);
        }

        .badge-user {
            background: var(--pl);
            color: var(--primary);
        }

        .badge-empresa {
            background: #dcfce7;
            color: #15803d;
        }

        .badge-admin {
            background: #fee2e2;
            color: var(--danger);
        }

        /* ── Botones de acción ── */
        .acciones {
            display: flex;
            gap: 8px;
        }

        .btn-accion {
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: .2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-verde {
            background: #dcfce7;
            color: #15803d;
        }

        .btn-verde:hover {
            background: var(--success);
            color: white;
        }

        .btn-rojo {
            background: #fee2e2;
            color: var(--danger);
        }

        .btn-rojo:hover {
            background: var(--danger);
            color: white;
        }

        .btn-gris {
            background: var(--bg);
            color: var(--muted);
        }

        .btn-gris:hover {
            background: var(--muted);
            color: white;
        }

        /* ── Perfil mini ── */
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--pl);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            flex-shrink: 0;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-nombre {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .user-email {
            font-size: 0.78rem;
            color: var(--muted);
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-box {
            background: white;
            width: 100%;
            max-width: 520px;
            border-radius: var(--r-xl);
            overflow: hidden;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            position: relative;
        }

        .modal-head {
            padding: 22px 28px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
        }

        .modal-head h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
        }

        .modal-head p {
            font-size: 0.82rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .modal-body {
            padding: 24px 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn-cerrar {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s;
        }

        .btn-cerrar:hover {
            background: var(--danger);
            color: white;
        }

        /* ── Perfil detalle en modal ── */
        .perfil-detalle {
            background: var(--bg);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .perfil-row {
            display: flex;
            gap: 8px;
            font-size: 0.88rem;
        }

        .perfil-row strong {
            color: var(--muted);
            min-width: 100px;
        }

        .perfil-desc {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #334155;
            white-space: pre-wrap;
        }

        /* ── Empty ── */
        .empty {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div id="toast-container"></div>

    <nav class="navbar">
        <div class="logo">
            Villa María <span>Empleos</span>
            <small>ADMIN</small>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
            <span style="color:#94a3b8;font-size:0.85rem" id="nombreAdmin">—</span>
            <button class="btn-nav danger" onclick="cerrarSesion()">
                <i data-lucide="log-out" style="width:14px"></i> Salir
            </button>
        </div>
    </nav>

    <div class="page">

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue"><i data-lucide="users"></i></div>
                <div>
                    <div class="stat-value" id="statUsuarios">—</div>
                    <div class="stat-label">Usuarios</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i data-lucide="building-2"></i></div>
                <div>
                    <div class="stat-value" id="statEmpresas">—</div>
                    <div class="stat-label">Empresas</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i data-lucide="clock"></i></div>
                <div>
                    <div class="stat-value" id="statPendientes">—</div>
                    <div class="stat-label">Solicitudes</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue"><i data-lucide="briefcase"></i></div>
                <div>
                    <div class="stat-value" id="statEmpleos">—</div>
                    <div class="stat-label">Avisos activos</div>
                </div>
            </div>
        </div>

        <!-- Panel principal con tabs -->
        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="cambiarTab('solicitudes', this)">
                    <i data-lucide="clock" style="width:14px"></i>
                    Solicitudes
                    <span class="tab-badge" id="badgeSolicitudes">0</span>
                </button>
                <button class="tab" onclick="cambiarTab('usuarios', this)">
                    <i data-lucide="users" style="width:14px"></i>
                    Todos los usuarios
                </button>
            </div>

            <!-- Tab: Solicitudes pendientes -->
            <div id="tab-solicitudes" class="tab-content active">
                <div id="listaSolicitudes">
                    <div class="empty">Cargando solicitudes...</div>
                </div>
            </div>

            <!-- Tab: Todos los usuarios -->
            <div id="tab-usuarios" class="tab-content">
                <div style="margin-bottom:16px">
                    <input type="text" id="buscadorUsuarios" placeholder="Buscar por nombre o email..."
                        oninput="filtrarUsuarios()"
                        style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:0.9rem;outline:none;">
                </div>
                <div id="listaUsuarios">
                    <div class="empty">Cargando usuarios...</div>
                </div>
            </div>
        </div>

    </div>

    <!-- Modal: ver perfil del solicitante -->
    <div id="modalPerfil" class="modal-overlay">
        <div class="modal-box">
            <button class="btn-cerrar" onclick="cerrarModal()">&times;</button>
            <div class="modal-head">
                <h3 id="modalNombre">—</h3>
                <p id="modalEmail">—</p>
            </div>
            <div class="modal-body">
                <div class="perfil-detalle" id="modalDetalle"></div>
                <div style="display:flex;gap:10px;margin-top:8px" id="modalAcciones"></div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        let todosLosUsuarios = [];

        function avatarHTML(u) {
            const inicial = (u.nombre || '?').charAt(0).toUpperCase();
            return `<div class="avatar">${inicial}</div>`;
        }

        function toast(msg, tipo = 'info') {
            const el = document.createElement('div');
            el.className = `toast ${tipo}`;
            const icon = tipo === 'success' ? '✓' : tipo === 'error' ? '✗' : 'ℹ';
            el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!verificarSesion()) return;
            const rol = localStorage.getItem('usuarioRol');
            if (rol !== 'ROLE_ADMIN') {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('nombreAdmin').innerText =
                localStorage.getItem('usuarioNombre') || 'Admin';
            cargarTodo();
        });

        async function cargarTodo() {
            await Promise.all([cargarSolicitudes(), cargarUsuarios(), cargarStats()]);
        }

        async function cargarStats() {
            try {
                const res = await apiFetch('/api/usuarios');
                const lista = await res.json();
                todosLosUsuarios = lista;

                document.getElementById('statUsuarios').innerText = lista.filter(u => u.tipo === 'ROLE_USER').length;
                document.getElementById('statEmpresas').innerText = lista.filter(u => u.tipo === 'ROLE_EMPRESA').length;
                const pendientes = lista.filter(u => u.estadoSolicitud === 'PENDIENTE').length;
                document.getElementById('statPendientes').innerText = pendientes;
                document.getElementById('badgeSolicitudes').innerText = pendientes;

                // Avisos activos — ruta pública, no necesita token
                const resE = await fetch('/api/empleos');
                const empleos = await resE.json();
                document.getElementById('statEmpleos').innerText = empleos.filter(e => e.activo).length;
            } catch { /* silencioso */ }
        }

        async function cargarSolicitudes() {
            const cont = document.getElementById('listaSolicitudes');
            try {
                const res = await apiFetch('/api/usuarios/solicitudes-empresa');
                const lista = await res.json();

                if (!lista.length) {
                    cont.innerHTML = '<div class="empty">No hay solicitudes pendientes. 🎉</div>';
                    return;
                }

                cont.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Usuario</th>
                            <th>Localidad</th>
                            <th>Registro</th>
                            <th style="text-align:right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${lista.map(u => `
                        <tr>
                            <td>
                                <div class="user-info">
                                    ${avatarHTML(u)}
                                    <div>
                                        <div class="user-nombre">${u.nombre}</div>
                                        <div class="user-email">${u.email}</div>
                                    </div>
                                </div>
                            </td>
                            <td>${u.localidad || '—'}</td>
                            <td>${u.fechaRegistro ? new Date(u.fechaRegistro).toLocaleDateString('es-AR') : '—'}</td>
                            <td>
                                <div class="acciones" style="justify-content:flex-end">
                                    <button class="btn-accion btn-gris" onclick="verPerfil(${u.id})">
                                        <i data-lucide="eye" style="width:13px"></i> Ver perfil
                                    </button>
                                    <button class="btn-accion btn-verde" onclick="aprobar(${u.id}, '${u.nombre.replace(/'/g, "\\'")}')">
                                        <i data-lucide="check" style="width:13px"></i> Aprobar
                                    </button>
                                    <button class="btn-accion btn-rojo" onclick="rechazar(${u.id}, '${u.nombre.replace(/'/g, "\\'")}')">
                                        <i data-lucide="x" style="width:13px"></i> Rechazar
                                    </button>
                                </div>
                            </td>
                        </tr>`).join('')}
                    </tbody>
                </table>`;
                lucide.createIcons();
            } catch {
                cont.innerHTML = '<div class="empty">Error al cargar solicitudes.</div>';
            }
        }

        async function aprobar(id, nombre) {
            if (!confirm(`¿Aprobar a "${nombre}" como empresa?`)) return;
            try {
                const res = await apiFetch(`/api/usuarios/${id}/aprobar-empresa`, { method: 'PUT' });
                if (res.ok) {
                    toast(`✓ ${nombre} aprobado/a como empresa.`, 'success');
                    cerrarModal();
                    cargarTodo();
                } else {
                    toast('Error al aprobar.', 'error');
                }
            } catch { toast('Error de conexión.', 'error'); }
        }

        async function rechazar(id, nombre) {
            if (!confirm(`¿Rechazar la solicitud de "${nombre}"?`)) return;
            try {
                const res = await apiFetch(`/api/usuarios/${id}/rechazar-empresa`, { method: 'PUT' });
                if (res.ok) {
                    toast(`Solicitud de ${nombre} rechazada.`, 'info');
                    cerrarModal();
                    cargarTodo();
                } else {
                    toast('Error al rechazar.', 'error');
                }
            } catch { toast('Error de conexión.', 'error'); }
        }

        async function verPerfil(id) {
            try {
                const res = await apiFetch(`/api/perfil/${id}`);
                const u = await res.json();

                document.getElementById('modalNombre').innerText = u.nombre;
                document.getElementById('modalEmail').innerText = u.email;

                document.getElementById('modalDetalle').innerHTML = `
                <div class="perfil-row"><strong>Localidad:</strong> ${u.localidad || '—'}</div>
                <div class="perfil-row"><strong>Teléfono:</strong>  ${u.telefono || '—'}</div>
                <div class="perfil-row"><strong>Estado:</strong>
                    <span class="badge badge-pendiente">${u.estadoSolicitud || '—'}</span>
                </div>
                ${u.descripcion ? `
                    <div style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-top:4px">Sobre mí</div>
                    <div class="perfil-desc">${u.descripcion}</div>
                ` : ''}
                ${u.experiencia ? `
                    <div style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-top:4px">Experiencia</div>
                    <div class="perfil-desc">${u.experiencia}</div>
                ` : ''}`;

                const nombreEsc = u.nombre.replace(/'/g, "\\'");
                document.getElementById('modalAcciones').innerHTML = `
                <button class="btn-accion btn-verde" style="flex:1;justify-content:center" onclick="aprobar(${u.id}, '${nombreEsc}')">
                    <i data-lucide="check" style="width:14px"></i> Aprobar como empresa
                </button>
                <button class="btn-accion btn-rojo" style="flex:1;justify-content:center" onclick="rechazar(${u.id}, '${nombreEsc}')">
                    <i data-lucide="x" style="width:14px"></i> Rechazar
                </button>`;

                document.getElementById('modalPerfil').style.display = 'flex';
                lucide.createIcons();
            } catch { toast('Error al cargar el perfil.', 'error'); }
        }

        function cerrarModal() {
            document.getElementById('modalPerfil').style.display = 'none';
        }

        async function cargarUsuarios() {
            const cont = document.getElementById('listaUsuarios');
            try {
                const res = await apiFetch('/api/usuarios');
                const lista = await res.json();
                todosLosUsuarios = lista;
                renderUsuarios(lista);
            } catch {
                cont.innerHTML = '<div class="empty">Error al cargar usuarios.</div>';
            }
        }

        function renderUsuarios(lista) {
            const cont = document.getElementById('listaUsuarios');
            if (!lista.length) {
                cont.innerHTML = '<div class="empty">No se encontraron usuarios.</div>';
                return;
            }
            cont.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Usuario</th><th>Rol</th><th>Solicitud</th><th>Registro</th>
                        <th style="text-align:right">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    ${lista.map(u => {
                const rolBadge = u.tipo === 'ROLE_ADMIN'
                    ? `<span class="badge badge-admin">Admin</span>`
                    : u.tipo === 'ROLE_EMPRESA'
                        ? `<span class="badge badge-empresa">Empresa</span>`
                        : `<span class="badge badge-user">Usuario</span>`;
                const solicitudBadge = u.estadoSolicitud === 'PENDIENTE'
                    ? `<span class="badge badge-pendiente">Pendiente</span>`
                    : u.estadoSolicitud === 'APROBADO'
                        ? `<span class="badge badge-aprobado">Aprobado</span>`
                        : `<span class="badge badge-ninguna">—</span>`;
                return `<tr>
                            <td>
                                <div class="user-info">
                                    ${avatarHTML(u)}
                                    <div>
                                        <div class="user-nombre">${u.nombre}</div>
                                        <div class="user-email">${u.email}</div>
                                    </div>
                                </div>
                            </td>
                            <td>${rolBadge}</td>
                            <td>${solicitudBadge}</td>
                            <td>${u.fechaRegistro ? new Date(u.fechaRegistro).toLocaleDateString('es-AR') : '—'}</td>
                            <td>
                                <div class="acciones" style="justify-content:flex-end">
                                    <button class="btn-accion btn-gris" onclick="verPerfil(${u.id})">
                                        <i data-lucide="eye" style="width:13px"></i> Ver
                                    </button>
                                </div>
                            </td>
                        </tr>`;
            }).join('')}
                </tbody>
            </table>`;
            lucide.createIcons();
        }

        function filtrarUsuarios() {
            const q = document.getElementById('buscadorUsuarios').value.toLowerCase();
            renderUsuarios(todosLosUsuarios.filter(u =>
                u.nombre.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
            ));
        }

        function cambiarTab(nombre, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${nombre}`).classList.add('active');
            btn.classList.add('active');
        }

        // cerrarSesion() es provista por auth.js
    </script>
    <script>lucide.createIcons();</script>
</body>

</html>
