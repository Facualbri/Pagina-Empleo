<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - Villa María Empleos</title>
    <meta name="description" content="Iniciá sesión en Villa María Empleos para buscar trabajo, postularte a vacantes y gestionar tu perfil profesional.">
    <meta name="google-site-verification" content="pgu1pJ3PhJKsEEopqdxyqUsYAmCWjiYw33BtfdOD4cc">
    <meta property="og:title" content="Ingresar - Villa María Empleos">
    <meta property="og:description" content="Iniciá sesión en Villa María Empleos.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_AR">
    <meta property="og:image" content="https://pagina-empleo.onrender.com/img/default-cover.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="card">
        <div class="logo">Villa María <span>Empleos</span></div>
        <h2>Bienvenido</h2>
        <p class="sub">Ingresá con tu cuenta para continuar</p>

        <div class="field">
            <label>Email</label>
            <div class="input-wrap">
                <i data-lucide="mail"></i>
                <input type="email" id="email" placeholder="tu@email.com"
                    onkeydown="if(event.key==='Enter')iniciarSesion()">
            </div>
        </div>

        <div class="field">
            <label>Contraseña</label>
            <div class="input-wrap">
                <i data-lucide="lock"></i>
                <input type="password" id="password" placeholder="••••••••"
                    onkeydown="if(event.key==='Enter')iniciarSesion()">
            </div>
        </div>

        <button class="btn-login" id="btnLogin" onclick="iniciarSesion()">
            <i data-lucide="log-in" style="width:18px"></i> Ingresar
        </button>

        <p class="msg" id="msg"></p>

        <div style="text-align:center; margin-top:14px;">
            <a href="olvide-password.html" style="color:var(--muted); font-size:0.82rem; font-weight:600; text-decoration:none; transition:.2s;"
               onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--muted)'">
                ¿Olvidaste tu contraseña?
            </a>
        </div>

        <div class="footer">
            ¿No tenés cuenta? <a href="registro.html">Registrarse</a>
        </div>
    </div>

    <footer style="text-align:center;padding:20px;font-size:0.82rem;color:#94a3b8;font-family:'DM Sans',sans-serif;margin-top:20px">
        Armada por <strong><span style="color:#38bdf8">K</span>odeaSoftware</strong>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
    <script>
        redirigirSiSesionActiva();
        lucide.createIcons();
    </script>
</body>

</html>
