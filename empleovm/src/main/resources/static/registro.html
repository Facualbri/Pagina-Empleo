<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta - Villa María Empleos</title>
    <meta name="description" content="Creá tu cuenta gratis en Villa María Empleos. Buscá trabajo o publicá vacantes como empresa en Villa María y zona.">
    <meta name="google-site-verification" content="pgu1pJ3PhJKsEEopqdxyqUsYAmCWjiYw33BtfdOD4cc">
    <meta property="og:title" content="Crear cuenta - Villa María Empleos">
    <meta property="og:description" content="Creá tu cuenta gratis en Villa María Empleos.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_AR">
    <meta property="og:image" content="https://pagina-empleo.onrender.com/img/default-cover.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link rel="stylesheet" href="css/registro.css">
</head>
<body>
<div class="card">
    <div class="logo">Villa María <span>Empleos</span></div>
    <h2>Crear cuenta</h2>
    <p class="sub">Elegí cómo querés unirte a la plataforma.</p>

    <!-- Selector de rol -->
    <div class="role-tabs">
        <button class="role-tab active" id="tabUser" onclick="setRol('USER')">
            <i data-lucide="user"></i> Busco trabajo
        </button>
        <button class="role-tab" id="tabEmpresa" onclick="setRol('EMPRESA')">
            <i data-lucide="building-2"></i> Soy empresa
        </button>
    </div>

    <div class="hint-box" id="hintEmpresa">
        ℹ️ Las cuentas de empresa permiten publicar vacantes y gestionar candidatos.
    </div>

    <div class="field">
        <label id="labelNombre">Nombre completo</label>
        <div class="input-wrap">
            <i data-lucide="user"></i>
            <input type="text" id="nombre" placeholder="Tu nombre completo">
        </div>
    </div>

    <div class="field">
        <label>Email</label>
        <div class="input-wrap">
            <i data-lucide="mail"></i>
            <input type="email" id="email" placeholder="tu@email.com">
        </div>
    </div>

    <div class="field">
        <label>Contraseña</label>
        <div class="input-wrap">
            <i data-lucide="lock"></i>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres">
        </div>
    </div>

    <div class="field">
        <label>Repetir contraseña</label>
        <div class="input-wrap">
            <i data-lucide="lock"></i>
            <input type="password" id="password2" placeholder="Repetí la contraseña">
        </div>
    </div>

    <button class="btn-register" id="btnRegister" onclick="registrar()">
        <i data-lucide="user-plus" style="width:18px"></i> Crear cuenta
    </button>

    <p class="msg" id="msg"></p>

    <div class="footer">
        ¿Ya tenés cuenta? <a href="login.html">Iniciá sesión</a>
    </div>
</div>

    <footer style="text-align:center;padding:20px;font-size:0.82rem;color:#94a3b8;font-family:'DM Sans',sans-serif;margin-top:20px">
        Armada por <strong><span style="color:#38bdf8">K</span>odeaSoftware</strong>
    </footer>

    <script src="js/registro.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
