<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Villa María Empleos</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="card">
    <div class="logo">Villa María <span>Empleos</span></div>
    <h2>Recuperar acceso</h2>
    <p class="sub">Ingresá tu email y te enviaremos un link para restablecer tu contraseña.</p>

    <div class="field">
        <label>Email</label>
        <div class="input-wrap">
            <i data-lucide="mail"></i>
            <input type="email" id="email" placeholder="tu@email.com"
                onkeydown="if(event.key==='Enter')enviar()">
        </div>
    </div>

    <button class="btn-login" id="btnEnviar" onclick="enviar()">
        <i data-lucide="send" style="width:18px"></i> Enviar link
    </button>

    <p class="msg" id="msg"></p>

    <div class="footer">
        <a href="login.html">Volver al inicio de sesión</a>
    </div>
</div>

<script>
async function enviar() {
    const email = document.getElementById('email').value.trim();
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btnEnviar');

    msg.className = 'msg';
    if (!email || !email.includes('@')) {
        msg.className = 'msg error';
        msg.innerText = 'Ingresá un email válido.';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = 'Enviando...';

    try {
        const res = await fetch('/api/auth/olvide-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });

        if (res.ok) {
            msg.className = 'msg success';
            msg.innerText = 'Si el email está registrado, vas a recibir un link de recuperación. Revisá tu bandeja de entrada.';
            btn.style.display = 'none';
        } else {
            const data = await res.json();
            msg.className = 'msg error';
            msg.innerText = data.error || 'Error al enviar. Intentá de nuevo.';
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="send" style="width:18px"></i> Enviar link';
            lucide.createIcons();
        }
    } catch {
        msg.className = 'msg error';
        msg.innerText = 'Error de conexión. Intentá de nuevo.';
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="send" style="width:18px"></i> Enviar link';
        lucide.createIcons();
    }
}

lucide.createIcons();
</script>
</body>
</html>
