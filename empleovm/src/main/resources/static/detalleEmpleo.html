<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Vacante - Villa María Empleos</title>
    <meta property="og:title" content="Detalle de Vacante - Villa María Empleos">
    <meta property="og:description" content="Conocé los detalles de esta oferta laboral y postulate.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_AR">
    <meta property="og:image" content="https://pagina-empleo.onrender.com/img/default-cover.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link rel="stylesheet" href="css/detalle.css">
</head>
<body>
    <div id="toast-container"></div>

    <nav class="navbar" style="display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:#0f172a;color:white;font-family:'DM Sans',sans-serif;">
        <h1 style="font-size:1.2rem;margin:0;">Villa María <span style="color:#5b5ef4;">Empleos</span></h1>
        <a href="empleos.html" style="color:#94a3b8;text-decoration:none;font-weight:600;font-family:'DM Sans',sans-serif;">← Volver al listado</a>
    </nav>

    <div class="detalle-container" style="max-width:720px;margin:0 auto;padding:32px 20px;font-family:'DM Sans',sans-serif;">
        <div class="info-header">
            <h2 id="tituloPuesto">Cargando vacante...</h2>
            <p><strong>Empresa:</strong> <span id="nombreEmpresa">-</span></p>
            <p><strong>Ubicación:</strong> <span id="ubicacionTexto">-</span></p>
            <div class="sueldo-destacado" id="sueldoTexto"></div>
        </div>

        <img id="modalFoto" src="" alt="Imagen de la vacante"
            style="width:100%;max-height:300px;object-fit:cover;border-radius:16px;margin:20px 0;display:none;"
            onerror="this.style.display='none'">

        <div class="cuerpo-detalle">
            <h3>Descripción del Puesto</h3>
            <div id="descripcionLarga" class="descripcion-box">
                Cargando detalles del puesto...
            </div>
        </div>

        <h3>Ubicación en el Mapa</h3>
        <div id="modalMapa" style="height:300px;width:100%;background:#f1f5f9;border-radius:16px;margin:20px 0;"></div>

        <div class="card-postulacion">
            <h3>¿Te interesa esta propuesta?</h3>
            <p>Adjuntá tu Currículum Vitae para que la empresa pueda contactarte.</p>

            <form id="formPostular">
                <div class="input-file-container">
                    <input type="file" id="cvArchivo" accept=".pdf,.jpg,.jpeg,.png" required>
                </div>
                <button type="button" class="btn-enviar" onclick="enviarPostulacionFinal()">
                    Enviar mi Postulación
                </button>
            </form>
        </div>
    </div>

    <footer style="text-align:center;padding:24px 20px;font-size:0.82rem;color:#94a3b8;font-family:'DM Sans',sans-serif;border-top:1px solid #e5e7eb;margin-top:40px">
        Armada por <strong><span style="color:#38bdf8">K</span>odeaSoftware</strong>
    </footer>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/detalle.js"></script>
</body>
</html>
