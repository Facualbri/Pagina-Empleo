<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña - Villa María Empleos</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="card" id="cardForm">
    <div class="logo">Villa María <span>Empleos</span></div>
    <h2>Nueva contraseña</h2>
    <p class="sub">Ingresá tu nueva contraseña.</p>

    <div id="contenidoForm">
        <div class="field">
            <label>Nueva contraseña</label>
            <div class="input-wrap">
                <i data-lucide="lock"></i>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres"
                    onkeydown="if(event.key==='Enter')restablecer()">
            </div>
        </div>

        <div class="field">
            <label>Repetir contraseña</label>
            <div class="input-wrap">
                <i data-lucide="lock"></i>
                <input type="password" id="password2" placeholder="Repetí la contraseña"
                    onkeydown="if(event.key==='Enter')restablecer()">
            </div>
        </div>

        <button class="btn-login" id="btnRestablecer" onclick="restablecer()">
            <i data-lucide="check-circle" style="width:18px"></i> Restablecer contraseña
        </button>

        <p class="msg" id="msg"></p>

        <div class="footer">
            <a href="login.html">Volver al inicio de sesión</a>
        </div>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token) {
    document.getElementById('contenidoForm').innerHTML = `
        <p class="msg error" style="margin-top:0">Link inválido. No se encontró el token de recuperación.</p>
        <div class="footer"><a href="olvide-password.html">Solicitar un nuevo link</a></div>
    `;
} else {
    // Validar token al cargar
    (async () => {
        try {
            const res = await fetch('/api/auth/validar-token?token=' + encodeURIComponent(token));
            if (!res.ok) {
                const data = await res.json();
                document.getElementById('contenidoForm').innerHTML = `
                    <p class="msg error" style="margin-top:0">${data.error || 'El token es inválido o expiró.'}</p>
                    <div class="footer"><a href="olvide-password.html">Solicitar un nuevo link</a></div>
                `;
            }
        } catch {
            document.getElementById('contenidoForm').innerHTML = `
                <p class="msg error" style="margin-top:0">Error de conexión. Intentá de nuevo.</p>
                <div class="footer"><a href="olvide-password.html">Solicitar un nuevo link</a></div>
            `;
        }
    })();
}

async function restablecer() {
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btnRestablecer');

    msg.className = 'msg';

    if (!password || password.length < 6) {
        msg.className = 'msg error';
        msg.innerText = 'La contraseña debe tener al menos 6 caracteres.';
        return;
    }
    if (password !== password2) {
        msg.className = 'msg error';
        msg.innerText = 'Las contraseñas no coinciden.';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = 'Restableciendo...';

    try {
        const res = await fetch('/api/auth/restablecer-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password })
        });

        if (res.ok) {
            document.getElementById('contenidoForm').innerHTML = `
                <p class="msg success" style="margin-top:0;font-size:1rem">✓ Contraseña actualizada correctamente.</p>
                <p style="text-align:center;color:var(--muted);font-size:0.88rem;margin-top:8px">Ya podés iniciar sesión con tu nueva contraseña.</p>
                <div class="footer"><a href="login.html" style="display:inline-block;background:var(--primary);color:white;padding:12px 24px;border-radius:12px;font-weight:700;text-decoration:none">Ir al inicio de sesión</a></div>
            `;
        } else {
            const data = await res.json();
            msg.className = 'msg error';
            msg.innerText = data.error || 'Error al restablecer. Intentá de nuevo.';
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="check-circle" style="width:18px"></i> Restablecer contraseña';
            lucide.createIcons();
        }
    } catch {
        msg.className = 'msg error';
        msg.innerText = 'Error de conexión. Intentá de nuevo.';
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="check-circle" style="width:18px"></i> Restablecer contraseña';
        lucide.createIcons();
    }
}

lucide.createIcons();
</script>
</body>
</html>
